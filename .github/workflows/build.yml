name: Build AimFOV APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/aimfov
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "AimFOV"
          include ':app'
          SETTINGS
          cat > build.gradle << 'BUILDGRADLE'
          plugins {
            id 'com.android.application' version '8.2.0' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          BUILDGRADLE
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          WRAPPER
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AimFOV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
